services:
  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - GitHub__Token=${GITHUB_TOKEN}
      - GitHub__WebhookSecret=${GITHUB_WEBHOOK_SECRET}
      - Ollama__Model=deepseek-coder-v2:16b
      - Ollama__Endpoint=http://ollama:11434/v1
    depends_on:
      - ollama

  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

volumes:
  ollama_data: